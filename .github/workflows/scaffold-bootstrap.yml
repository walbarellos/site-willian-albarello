name: Scaffold Bootstrap

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: scaffold-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    name: Bootstrap Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Setup PNPM
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Hardening
        run: pnpm run verify:hardening
